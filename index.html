<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Launcher</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="starfield"></canvas>

<div class="sticky-top">
  <header>
    <div class="brand">⚡ AppLauncher</div>
    <div class="view-toggle">
      <button class="view-btn active" id="btnGrid" onclick="setView('grid')" title="Grid">⊞</button>
      <button class="view-btn" id="btnList" onclick="setView('list')" title="List">☰</button>
    </div>
  </header>
  <div class="search-wrap" style="position:relative;">
    <span class="search-icon">🔍</span>
    <input type="search" id="search" placeholder="Cari aplikasi..." oninput="filterApps(this.value)">
  </div>
</div>

<div class="main" id="main"></div>
<div class="no-results" id="noResults">Tidak ada hasil untuk "<span id="searchTerm"></span>"</div>

<!-- Copyright Footer -->
<div class="footer">
  <div class="footer-inner">
    <span class="footer-icon">👑</span>
    <span class="footer-text">© <span id="copyright-year"></span> KingSyah</span>
    <span class="footer-icon">👑</span>
  </div>
  <nav class="footer-nav">
    <a href="index.html" class="active">⚡ App Launcher</a>
    <a href="Tools/index.html">⚙️ Button Editor</a>
  </nav>
</div>

<script src="starfield.js"></script>
<script src="app.js"></script>
</body>
</html>
